<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#09090b">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>Exam Tutor</title>
<style>
/* ═══════════════════════════════════════════════
   Design Tokens
   ═══════════════════════════════════════════════ */
:root {
  --bg: #09090b;
  --bg-alt: #12121a;
  --surface: #18181f;
  --surface-hover: #20202a;
  --border: #272735;
  --border-light: #1e1e2a;
  --text: #e4e4eb;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  --accent: #818cf8;
  --accent-glow: rgba(129,140,248,.25);
  --accent-subtle: rgba(129,140,248,.08);
  --success: #34d399;
  --success-subtle: rgba(52,211,153,.10);
  --error: #f87171;
  --error-subtle: rgba(248,113,113,.10);
  --warn: #fbbf24;
  --warn-subtle: rgba(251,191,36,.10);
  --radius: 14px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --safe-bottom: env(safe-area-inset-bottom, 16px);
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  --transition: .25s cubic-bezier(.4,0,.2,1);
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}
.app {
  height:100%;
  display:flex;
  flex-direction:column;
  max-width:480px;
  margin:0 auto;
  position:relative;
  overflow:hidden;
}

/* ═══════════════════════════════════════════════
   Top Bar
   ═══════════════════════════════════════════════ */
.topbar {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  min-height:52px;
  flex-shrink:0;
  border-bottom: 1px solid var(--border-light);
  background: var(--bg);
  z-index: 5;
}
.topbar .back {
  color: var(--text-secondary);
  font-size: .9rem;
  cursor: pointer;
  padding: 8px 4px;
  z-index: 1;
  transition: color var(--transition);
}
.topbar .back:hover { color: var(--text); }
.topbar .title {
  font-size: .95rem;
  font-weight: 600;
  color: #fff;
  letter-spacing: -.01em;
}
.topbar .badge {
  font-size: .72rem;
  color: var(--accent);
  background: var(--accent-subtle);
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 500;
  z-index: 1;
  letter-spacing: .02em;
}
.topbar .qnav {
  font-size: .9rem;
  color: var(--accent);
  cursor: pointer;
  z-index: 1;
  padding: 6px 0;
  font-weight: 500;
}
.topbar .qnav.centered {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-size: 1rem;
  color: var(--text-secondary);
}
.topbar .qnav.centered .qc { color: var(--accent); font-weight: 700; }

/* ═══════════════════════════════════════════════
   Screens
   ═══════════════════════════════════════════════ */
.screen {
  flex:1;
  overflow-y: auto;
  overflow-x: hidden;
  display:none;
  flex-direction:column;
  -webkit-overflow-scrolling: touch;
}
.screen.active { display:flex; }

/* ═══════════════════════════════════════════════
   Home Screen
   ═══════════════════════════════════════════════ */
#screen-home { gap: 0; }

/* Hero section */
.hero {
  text-align: center;
  padding: 32px 24px 8px;
  flex-shrink: 0;
}
.hero .logo {
  width: 56px;
  height: 56px;
  margin: 0 auto 12px;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  box-shadow: 0 8px 32px var(--accent-glow);
}
.hero h1 {
  font-size: 1.4rem;
  color: #fff;
  font-weight: 700;
  letter-spacing: -.02em;
  margin-bottom: 4px;
}
.hero p {
  font-size: .85rem;
  color: var(--text-muted);
  line-height: 1.5;
}

/* Upload zone */
.upload-zone {
  margin: 0 16px 16px;
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 28px 16px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
  background: var(--bg-alt);
  flex-shrink: 0;
}
.upload-zone.dragover {
  border-color: var(--accent);
  background: var(--accent-subtle);
  box-shadow: 0 0 0 4px var(--accent-glow);
}
.upload-zone .uz-icon {
  font-size: 2rem;
  margin-bottom: 8px;
  display: block;
}
.upload-zone .uz-label {
  font-size: .9rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}
.upload-zone .uz-hint {
  font-size: .78rem;
  color: var(--text-muted);
}
.upload-zone .dt-only { display: none; }
@media (hover: hover) and (pointer: fine) {
  .upload-zone .dt-only { display: inline; }
}

/* Action buttons */
.actions {
  display: flex;
  gap: 10px;
  margin: 0 16px 0;
  flex-shrink: 0;
}
.actions .act-btn {
  flex: 1;
  padding: 14px 12px;
  border-radius: var(--radius);
  border: none;
  font-size: .9rem;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: all var(--transition);
  font-family: var(--font);
}
.act-btn.primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 14px var(--accent-glow);
}
.act-btn.primary:active { transform: scale(.97); box-shadow: 0 2px 8px var(--accent-glow); }
.act-btn.secondary {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}
.act-btn.secondary:active { background: var(--surface-hover); }
.act-btn .ic { font-size: 1.5rem; line-height: 1; }

/* History */
.hist-section {
  border-top: 1px solid var(--border-light);
  flex: 1;
  overflow-y: auto;
  min-height: 0;
  padding: 0 16px;
}
.hist-section h3 {
  font-size: .78rem;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .06em;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 2;
  padding: 16px 0 10px;
  margin: 0;
}

/* Empty state */
.empty-state {
  padding: 32px 24px;
  text-align: center;
  flex-shrink: 0;
}
.empty-state .es-icon {
  font-size: 2.5rem;
  margin-bottom: 12px;
  opacity: .5;
}
.empty-state p {
  font-size: .85rem;
  color: var(--text-muted);
  line-height: 1.6;
}

/* History items */
.hist-item {
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-bottom: 8px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all var(--transition);
}
.hist-item:active {
  border-color: var(--accent);
  background: var(--surface-hover);
}
.hist-item .hi-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.hist-item .hi-date {
  font-size: .73rem;
  color: var(--text-muted);
  min-width: 38px;
  font-variant-numeric: tabular-nums;
}
.hist-item .hi-tag {
  font-size: .7rem;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
}
.hist-item .hi-tag.type {
  color: var(--accent);
  background: var(--accent-subtle);
}
.hist-item .hi-tag.variant {
  color: var(--warn);
  background: var(--warn-subtle);
}
.hist-item .hi-tag.count {
  color: var(--text-secondary);
  background: rgba(255,255,255,.05);
}
.hist-item .hi-preview {
  font-size: .8rem;
  color: var(--text-muted);
  line-height: 1.5;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.hist-more {
  text-align: center;
  padding: 8px 0 24px;
}
.hist-more button {
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--border);
  padding: 8px 28px;
  border-radius: 20px;
  font-size: .82rem;
  cursor: pointer;
  font-family: var(--font);
  font-weight: 500;
  transition: all var(--transition);
}
.hist-more button:hover { background: var(--accent-subtle); }
.hist-more button:disabled { opacity: .3; cursor: default; }

/* ═══════════════════════════════════════════════
   Processing Screen
   ═══════════════════════════════════════════════ */
#screen-processing {
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 32px 24px;
  gap: 24px;
}

/* Progress track */
.progress-track {
  width: 100%;
  max-width: 280px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.progress-bar-bg {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 20px;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #a78bfa);
  border-radius: 2px;
  width: 0%;
  transition: width .6s cubic-bezier(.4,0,.2,1);
}
.progress-steps {
  display: flex;
  justify-content: space-between;
  position: relative;
}
.progress-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  flex: 1;
  position: relative;
}
.progress-step .ps-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--border);
  transition: all .4s ease;
  position: relative;
  z-index: 1;
}
.ps-dot.active {
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent-glow);
}
.ps-dot.done {
  background: var(--success);
  box-shadow: 0 0 8px rgba(52,211,153,.3);
}
.ps-dot.error {
  background: var(--error);
  box-shadow: 0 0 8px rgba(248,113,113,.3);
}
.progress-step .ps-label {
  font-size: .72rem;
  color: var(--text-muted);
  font-weight: 500;
  transition: color .3s;
}
.progress-step .ps-dot.active ~ .ps-label,
.ps-dot.active + .ps-label { color: var(--accent); }
.ps-dot.done ~ .ps-label,
.ps-dot.done + .ps-label { color: var(--success); }

/* Status text */
.proc-status {
  font-size: 1rem;
  color: #fff;
  font-weight: 600;
  letter-spacing: -.01em;
}
.proc-detail {
  font-size: .82rem;
  color: var(--text-muted);
  line-height: 1.5;
  max-width: 300px;
}
.proc-hint {
  font-size: .75rem;
  color: var(--text-muted);
  opacity: .6;
}

/* Cancel button */
.proc-cancel {
  margin-top: 8px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 8px 24px;
  border-radius: 20px;
  font-size: .82rem;
  cursor: pointer;
  font-family: var(--font);
  transition: all var(--transition);
}
.proc-cancel:hover { color: var(--error); border-color: var(--error); }

/* Error box */
.err-box {
  text-align: center;
  padding: 8px 0;
}
.err-box .msg {
  font-size: .95rem;
  color: var(--error);
  margin-bottom: 20px;
  line-height: 1.6;
}
.err-box .retry {
  padding: 10px 28px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 22px;
  font-size: .9rem;
  cursor: pointer;
  font-family: var(--font);
  font-weight: 600;
  transition: all var(--transition);
}
.err-box .retry:active { transform: scale(.96); }

/* ═══════════════════════════════════════════════
   Review Screen
   ═══════════════════════════════════════════════ */
#screen-review { overflow: hidden; position: relative; }

/* Toast */
.toast {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%) translateY(-120%);
  z-index: 20;
  background: var(--warn-subtle);
  border: 1px solid var(--warn);
  color: var(--warn);
  padding: 10px 18px;
  border-radius: 22px;
  font-size: .8rem;
  font-weight: 500;
  max-width: 90%;
  text-align: center;
  transition: transform .35s cubic-bezier(.22,1,.36,1);
  pointer-events: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.info { background: var(--accent-subtle); border-color: var(--accent); color: var(--accent); }
.toast.success { background: var(--success-subtle); border-color: var(--success); color: var(--success); }

/* Card container */
.cc {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.ct {
  display: flex;
  height: 100%;
  transition: transform .35s cubic-bezier(.25,.1,.25,1);
  will-change: transform;
}

/* Card */
.card {
  flex: 0 0 100%;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0 16px calc(72px + var(--safe-bottom));
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}
.card-header {
  padding: 16px 0 8px;
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.card-header .q-num {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--accent);
}
.card-header .q-answer {
  font-size: .82rem;
  color: var(--success);
  font-weight: 600;
  background: var(--success-subtle);
  padding: 2px 10px;
  border-radius: 10px;
}
.card-header .q-type {
  font-size: .72rem;
  color: var(--text-muted);
  margin-left: auto;
}

/* Passage block */
.passage-block {
  background: var(--surface);
  border-radius: var(--radius-sm);
  margin: 0 0 14px;
  overflow: hidden;
  border: 1px solid var(--border-light);
}
.passage-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  cursor: pointer;
  font-size: .85rem;
  color: var(--text-secondary);
  font-weight: 500;
  gap: 8px;
  user-select: none;
}
.passage-header .ar {
  font-size: .7rem;
  transition: transform var(--transition);
  color: var(--text-muted);
}
.passage-block.open .passage-header .ar { transform: rotate(180deg); }
.passage-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows .35s ease;
}
.passage-block.open .passage-body { grid-template-rows: 1fr; }
.passage-text {
  padding: 0 14px 14px;
  overflow: hidden;
  font-size: .82rem;
  line-height: 1.8;
  color: var(--text);
  font-family: var(--font-mono);
  white-space: pre-wrap;
  word-break: break-word;
}

/* Module */
.mod {
  margin-bottom: 2px;
}
.mh {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 2px;
  cursor: pointer;
  min-height: 48px;
  font-size: .92rem;
  font-weight: 600;
  color: var(--accent);
  gap: 8px;
  transition: color var(--transition);
}
.mh:hover { color: #a5b4fc; }
.mh .mh-label { flex: 1; letter-spacing: -.01em; }
.mh .mh-tts {
  font-size: .9rem;
  opacity: .4;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: all var(--transition);
  flex-shrink: 0;
  line-height: 1;
}
.mh .mh-tts:hover { opacity: 1; background: var(--accent-subtle); }
.mh .ar {
  font-size: .75rem;
  color: var(--text-muted);
  transition: transform var(--transition);
}
.mod.open .mh .ar { transform: rotate(180deg); }
.mb {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows .35s ease;
  overflow: hidden;
}
.mod.open .mb { grid-template-rows: 1fr; }
.mbi {
  overflow: hidden;
  min-height: 0;
  font-size: .9rem;
  line-height: 1.85;
  color: var(--text);
  border-left: 2px solid transparent;
  transition: border-color var(--transition), padding var(--transition);
}
.mod.open .mbi {
  padding: 0 0 14px 14px;
  border-left-color: var(--border);
}
.mbi u, .mbi mark {
  color: #fbbf24;
  text-decoration: underline;
  text-underline-offset: 3px;
  background: transparent;
}
.mbi strong { color: #fff; font-weight: 600; }
.mbi .ans { color: var(--success); font-weight: 700; }

/* Source context block */
.src-block {
  background: var(--surface);
  border-radius: var(--radius-sm);
  margin: 10px 0 4px;
  overflow: hidden;
  border: 1px solid var(--border-light);
}
.src-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  cursor: pointer;
  font-size: .8rem;
  color: var(--text-muted);
  font-weight: 500;
}
.src-header .ar {
  font-size: .7rem;
  transition: transform var(--transition);
}
.src-block.open .src-header .ar { transform: rotate(180deg); }
.src-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows .35s ease;
}
.src-block.open .src-body { grid-template-rows: 1fr; }
.src-text {
  padding: 0 14px 12px;
  overflow: hidden;
  font-size: .78rem;
  line-height: 1.65;
  color: var(--text-muted);
  font-family: var(--font-mono);
  white-space: pre-wrap;
  word-break: break-word;
}

/* ═══════════════════════════════════════════════
   Bottom Nav
   ═══════════════════════════════════════════════ */
.bnav {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px 16px calc(10px + var(--safe-bottom));
  gap: 14px;
  border-top: 1px solid var(--border-light);
  flex-shrink: 0;
  background: var(--bg);
  z-index: 3;
}
.bnav .nb {
  color: var(--accent);
  font-size: .95rem;
  cursor: pointer;
  padding: 10px 14px;
  border: none;
  background: none;
  border-radius: var(--radius-sm);
  min-width: 44px;
  text-align: center;
  transition: all var(--transition);
  font-family: var(--font);
  font-weight: 500;
}
.bnav .nb:active { background: var(--accent-subtle); }
.bnav .nb:disabled { color: var(--border); cursor: default; background: none; }
.bnav .nb.play-btn {
  background: var(--accent);
  color: #fff;
  border-radius: 22px;
  padding: 8px 20px;
  font-size: .88rem;
  font-weight: 600;
  box-shadow: 0 4px 12px var(--accent-glow);
}
.bnav .nb.play-btn:active { transform: scale(.96); }
.bnav .nb.play-btn.playing {
  background: #a855f7;
  box-shadow: 0 4px 14px rgba(168,85,247,.3);
}
.bnav .dots {
  display: flex;
  gap: 7px;
  align-items: center;
  overflow-x: auto;
  max-width: 140px;
  padding: 4px 0;
}
.bnav .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--border);
  transition: all .3s;
  flex-shrink: 0;
  cursor: pointer;
}
.bnav .dot.done { background: var(--accent); opacity: .5; }
.bnav .dot.cur { background: var(--accent); width: 20px; border-radius: 4px; }

/* TTS active highlight */
.tts-active {
  background: rgba(168,85,247,.2) !important;
  border-radius: 4px;
  transition: background .2s;
}

/* ═══════════════════════════════════════════════
   Overlay (Question List)
   ═══════════════════════════════════════════════ */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 10;
  display: none;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.overlay.show { display: flex; }
.osheet {
  width: 100%;
  max-width: 480px;
  max-height: 70vh;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 24px 16px calc(24px + var(--safe-bottom));
  overflow-y: auto;
  animation: slideUp .3s ease;
}
@keyframes slideUp {
  from { transform: translateY(20%); }
  to { transform: translateY(0); }
}
.osheet h3 {
  font-size: 1rem;
  color: #fff;
  margin-bottom: 16px;
  font-weight: 600;
}
.oi {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--transition);
  min-height: 48px;
  font-size: .9rem;
}
.oi:active { background: var(--surface-hover); }
.oi .qn { color: var(--text-muted); font-weight: 600; min-width: 24px; }
.oi .qt { flex: 1; color: var(--text); line-height: 1.4; }
.oi .qs { font-size: .78rem; color: var(--text-muted); }
.oi .qs.seen { color: var(--success); }
.oi.cur { background: var(--accent-subtle); }

  <div class="screen" id="screen-processing">

      <div class="progress-steps">
        <div class="progress-step" id="ps-upload"><div class="ps-dot active"></div><div class="ps-label">上传</div></div>

  <!-- Screen: Review -->

    <div class="osheet" id="osheet">

    </div>

<script>
// ═══════════════════════════════════════════════
// Config & State
// ═══════════════════════════════════════════════
let apiBase='', pageSize=20, allowedTypes=[], _configOK=false;
let exams=[], ci=0, visited=new Set(), tsx=0, tsy=0;
let examId=null, examType='', variant='';
let _doneReceived=false, passageText='', s1Questions=[];
let histPage=1, histDone=false, _activeSSE=null;

const MAX_SIDE=1920, JPEG_QUALITY=0.8, MAX_RAW_SIZE=50*1024*1024;
const TYPE_LABEL={grammar_cloze:'语法选择',cloze:'完形填空',reading_comp:'阅读理解',true_false:'正误判断'};
const VARIANT_LABEL={open_ended:'开放型填空'};
const MODULE_ORDER={
  '上下文':['上下文','生词洞察','选项词义','考点','解析','排除法'],
  '题干定位':['题干定位','选项词义','考点','解析','排除法'],
  '原句/题干':['原句/题干','原文依据','考点','解析'],
  '上下文_open':['上下文','生词洞察','考点','解析','推断思路'],
  '题干定位_open':['题干定位','考点','解析','推断思路'],
};
const DEFAULTS_OPEN=['解析','上下文','题干定位','原句/题干','推断思路'];
const TTS_AUTO={cloze:['解析','考点','上下文'],reading:['解析','考点','题干定位'],tf:['解析','考点','原句/题干','原文依据']};
const TTS_MANUAL=['生词洞察'];

// ═══════════════════════════════════════════════
// Screen Management
// ═══════════════════════════════════════════════
function ss(n) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById('screen-'+n);
  if(el) el.classList.add('active');
  const bb=document.getElementById('btn-back'), ti=document.getElementById('title'),
        bd=document.getElementById('badge'), bo=document.getElementById('btn-ov');
  bb.style.visibility='visible'; bd.style.display='none'; bo.style.display='none';
  bo.classList.remove('centered');
  if(n==='home') {
    ti.textContent='Exam Tutor'; bb.style.visibility='hidden';
    loadHist(true);
  } else if(n==='processing') {
    ti.textContent='';
  } else if(n==='review') {
    ti.textContent=''; bo.style.display='block'; bo.classList.add('centered');
    if(examType) {
      bd.style.display='block';
      let label=TYPE_LABEL[examType]||examType;
      if(variant&&variant!=='multiple_choice') label+=' · '+(VARIANT_LABEL[variant]||variant);
      bd.textContent=label;
    }
  }
}

// ═══════════════════════════════════════════════
// Progress Steps
// ═══════════════════════════════════════════════
function setStep(stepIdx) {
  const steps=['ps-upload','ps-ocr','ps-s1','ps-s2'];
  const pct=[10, 35, 60, 85];
  steps.forEach((id,i)=>{
    const el=document.getElementById(id);
    const dot=el.querySelector('.ps-dot');
    dot.classList.remove('active','done','error');
    if(i<stepIdx) dot.classList.add('done');
    else if(i===stepIdx) dot.classList.add('active');
  });
  document.getElementById('progress-fill').style.width=pct[stepIdx]+'%';
}

function setStepError(stepIdx) {
  const steps=['ps-upload','ps-ocr','ps-s1','ps-s2'];
  steps.forEach((id,i)=>{
    const dot=document.getElementById(id).querySelector('.ps-dot');
    if(i===stepIdx) { dot.classList.remove('active'); dot.classList.add('error'); }
  });
  document.getElementById('progress-fill').style.background='var(--error)';
}

// ═══════════════════════════════════════════════
// Toast
// ═══════════════════════════════════════════════
let _toastTimer;
function showToast(msg, type) {
  const el=document.getElementById('toast');
  clearTimeout(_toastTimer);
  el.className='toast '+(type||'');
  el.textContent=msg;
  requestAnimationFrame(()=>el.classList.add('show'));
  _toastTimer=setTimeout(()=>el.classList.remove('show'), 3500);
}

// ═══════════════════════════════════════════════
// File Handling
// ═══════════════════════════════════════════════
function handleFiles(inputEl) {
  try {
    const files=Array.from(inputEl.files);
    inputEl.value='';
    if(!files.length) return;
    _doneReceived=false;
    up(files);
  } catch(e) {
    document.getElementById('pst').textContent='❌ 上传异常';
    document.getElementById('psd').textContent=e.message;
    ss('processing');
  }
}

async function preprocessImage(file) {
  if(file.size>=MAX_RAW_SIZE) throw new Error('图片过大（'+(file.size/1048576).toFixed(1)+' MB），请选择已压缩的版本。');
  try {
    const bmp=await createImageBitmap(file);
    if(bmp.width<=MAX_SIDE&&bmp.height<=MAX_SIDE) { bmp.close(); return file; }
    const scale=Math.min(MAX_SIDE/Math.max(bmp.width,bmp.height), 1.0);
    const c=document.createElement('canvas');
    c.width=Math.round(bmp.width*scale); c.height=Math.round(bmp.height*scale);
    c.getContext('2d').drawImage(bmp, 0, 0, c.width, c.height);
    bmp.close();
    return await new Promise((resolve, reject)=>{
      c.toBlob(blob=>{
        if(blob) { resolve(new File([blob], file.name, {type:'image/jpeg'})); return; }
        try {
          const dataUrl=c.toDataURL('image/jpeg', JPEG_QUALITY);
          const byteStr=atob(dataUrl.split(',')[1]);
          const ab=new ArrayBuffer(byteStr.length);
          const ua=new Uint8Array(ab);
          for(let i=0;i<byteStr.length;i++) ua[i]=byteStr.charCodeAt(i);
          resolve(new File([ab], file.name, {type:'image/jpeg'}));
        } catch(e2) { reject(new Error('图片处理失败，请重试。')); }
      }, 'image/jpeg', JPEG_QUALITY);
    });
  } catch(e) { throw new Error('图片格式不支持或已损坏，请使用 JPG 或 PNG。'); }
}

async function preprocessImages(files) {
  const processed=[], errors=[];
  for(const f of Array.from(files)) {
    try { processed.push(await preprocessImage(f)); }
    catch(e) { errors.push({name:f.name, reason:e.message}); }
  }
  if(errors.length) {
    if(processed.length===0) throw new Error(errors.map(e=>e.reason).filter((v,i,a)=>a.indexOf(v)===i).join('；'));
    document.getElementById('psd').textContent=processed.length+'/'+files.length+' 张处理成功（'+errors.map(e=>e.name).join('、')+' 失败）';
  }
  return processed;
}

function cancelProcess() {
  if(_activeSSE) { _activeSSE.close(); _activeSSE=null; }
  ss('home');
}

async function up(files) {
  if(!files.length) return;
  ss('processing');
  setStep(0);
  document.getElementById('pst').textContent='正在处理图片…';
  document.getElementById('psd').textContent=files.length+' 张';
  document.getElementById('proc-hint').style.display='block';
  document.getElementById('proc-cancel').style.display='block';
  document.getElementById('progress-fill').style.background='';

  let uploadFiles;
  try {
    uploadFiles=await preprocessImages(files);
    document.getElementById('psd').textContent=uploadFiles.length+' 张（已优化）';
  } catch(e) { se(e.message, true); return; }

  setStep(1);
  document.getElementById('pst').textContent='正在上传…';

  const fd=new FormData();
  uploadFiles.forEach(f=>fd.append('images', f));
  try {
    const r=await fetch(apiBase+'/exams', {method:'POST', body:fd});
    const body=await r.json().catch(()=>({}));
    if(body.error) { se(body.error, true); return; }
    if(!body.session_id) { se('服务响应异常，请重试', true); return; }
    const session_id=body.session_id;

    setStep(2);
    document.getElementById('pst').textContent='正在识别试卷文字…';
    document.getElementById('psd').textContent='';

    const es=new EventSource(apiBase+'/sse/ui?session='+session_id);
    _activeSSE=es;
    let _sseErrors=0;

    es.onmessage=e=>{
      const d=JSON.parse(e.data);
      switch(d.stage) {
        case 'connected': break;
        case 'ocr':
          if(d.status==='start') { setStep(2); document.getElementById('pst').textContent='正在识别试卷文字…'; }
          else if(d.status==='done') {
            setStep(3);
            document.getElementById('pst').textContent='正在分析试卷结构…';
            document.getElementById('psd').textContent='文字识别完成，共 '+d.chars+' 字符';
          }
          break;
        case 'stage1':
          if(d.status==='done') {
            setStep(3);
            document.getElementById('pst').textContent='正在逐题生成精讲…';
            setVariant(d.variant||'');
            document.getElementById('psd').textContent='共 '+d.question_count+' 题 · '+(TYPE_LABEL[d.exam_type]||d.exam_type);
          }
          break;
        case 'stage2':
          if(d.status==='progress') {
            document.getElementById('psd').textContent='AI 正在深度分析中… 请稍候';
            document.getElementById('progress-fill').style.width='92%';
          } else if(d.status==='done') {
            _doneReceived=true;
            document.getElementById('progress-fill').style.width='100%';
            const dots=document.querySelectorAll('#screen-processing .ps-dot');
            dots.forEach(d=>{d.classList.remove('active');d.classList.add('done')});
            es.close(); _activeSSE=null;
            document.getElementById('proc-cancel').style.display='none';
            setTimeout(()=>renderReviewData(reviewDataFromSSE(d)), 300);
          }
          break;
        case 'error':
          es.close(); _activeSSE=null;
          document.getElementById('proc-cancel').style.display='none';
          setStepError(3);
          se(d.message, d.recoverable);
          break;
      }
    };
    es.onerror=()=>{
      if(es.readyState===EventSource.CLOSED) return;
      if(++_sseErrors>=3) { es.close(); _activeSSE=null; if(!_doneReceived) se('连接多次中断，请重试', true); }
    };
    es.onopen=()=>{ _sseErrors=0; };
  } catch(err) { se('网络错误，请检查连接后重试', true); }
}

function se(msg, retry) {
  ss('processing');
  document.getElementById('pst').textContent='❌ 出错了';
  document.getElementById('psd').innerHTML=
    '<div class="err-box"><div class="msg">'+msg+'</div>'+
    (retry?'<button class="retry" onclick="ss(\'home\')">返回重试</button>':'')+'</div>';
  document.getElementById('proc-hint').style.display='none';
  document.getElementById('proc-cancel').style.display='none';
}

// ═══════════════════════════════════════════════
// Review Data Contract
// ═══════════════════════════════════════════════
function reviewDataFromSSE(d) {
  return {questions:d.questions||[], exam_id:d.exam_id||'',
    exam_type:d.exam_type||'', variant:d.variant||'',
    passage:d.passage||'', s1_questions:d.s1_questions||[], warnings:d.warnings||[]};
}
function reviewDataFromDB(e) {
  return {questions:e.tutorial?JSON.parse(e.tutorial):[], exam_id:e.id||'',
    exam_type:e.exam_type||'', variant:e.variant||'', passage:e.passage||'',
    s1_questions:e.s1_questions?JSON.parse(e.s1_questions):[], warnings:[]};
}

function renderReviewData(rd) {
  examId=rd.exam_id; setExamType(rd.exam_type); setVariant(rd.variant);
  passageText=rd.passage; s1Questions=rd.s1_questions;
  ss('review');
  renderCards(rd.questions);
  const pb=document.getElementById('passage-block');
  if(passageText) {
    document.getElementById('passage-text').textContent=passageText;
    pb.style.display='block'; pb.classList.remove('open');
  } else { pb.style.display='none'; }
  document.getElementById('btn-play').style.display='block';
  document.getElementById('btn-play').classList.remove('playing');
  const vs=ttsVoicesOK();
  if(vs==='loading') {
    setTimeout(()=>{
      const vs2=ttsVoicesOK();
      if(vs2!=='ok'&&vs2!=='unsupported') document.getElementById('btn-play').title=vs2==='no-zh'?'缺少中文语音包':'缺少英文语音包';
    }, 1000);
  } else if(vs!=='ok') {
    document.getElementById('btn-play').disabled=true;
    document.getElementById('btn-play').style.opacity='0.4';
    document.getElementById('btn-play').title=vs==='unsupported'?'浏览器不支持语音朗读':vs==='no-zh'?'缺少中文语音':'缺少英文语音';
  }
  // Toast for warnings
  if(rd.warnings&&rd.warnings.length) {
    showToast('⚠ '+rd.warnings.join('; '), '');
  }
  if(rd.variant==='open_ended') {
    showToast('📌 开放型填空，答案为 AI 推断，建议核对标准答案', 'info');
  }
}

function renderCards(qs) {
  exams=qs; visited=new Set(); ci=0; ttsStop();
  const tr=document.getElementById('ct'), dots=document.getElementById('dots');
  tr.innerHTML=''; dots.innerHTML='';
  qs.forEach((q,i)=>{
    const d=document.createElement('span');
    d.className='dot'; d.onclick=()=>go(i);
    dots.appendChild(d);
    const c=document.createElement('div');
    c.className='card';
    c.innerHTML=rc(q,i);
    c.addEventListener('touchstart', ts, {passive:true});
    c.addEventListener('touchend', te, {passive:true});
    tr.appendChild(c);
  });
  go(0);
}

function rc(q,i) {
  const m=q.modules;
  let o=getMO(m,variant);
  let h='<div class="card-header"><span class="q-num">第 '+q.number+' 题</span>';
  if(q.answer) h+='<span class="q-answer">'+q.answer+'</span>';
  h+='<span class="q-type">'+(variant==='open_ended'?'开放型':'选择')+'</span></div>';

  for(const n of o) {
    if(!m[n]) continue;
    const c=md(m[n]);
    const op=DEFAULTS_OPEN.includes(n);
    const canTTS=getTTSAutoSeq().includes(n)||TTS_MANUAL.includes(n);
    h+='<div class="mod'+(op?' open':'')+'">'+
      '<div class="mh" onclick="tm(this.parentElement)">'+
        '<span class="mh-label">'+n+'</span>'+
        (canTTS?'<span class="mh-tts" onclick="event.stopPropagation();ttsSpeakModule(\''+
          n.replace(/'/g,"\\'")+'\','+i+')" title="朗读">🔊</span>':'')+
        '<span class="ar">▼</span>'+
      '</div>'+
      '<div class="mb"><div class="mbi" id="mod-'+i+'-'+n+'">'+c+'</div></div>'+
      '</div>';
  }

  // Source context
  if(s1Questions[i]) {
    const sq=s1Questions[i];
    const src=[sq.context_before, sq.sentence_with_blank, sq.context_after].filter(Boolean);
    if(src.length) {
      h+='<div class="src-block"><div class="src-header" onclick="this.parentElement.classList.toggle(\'open\')">'+
        '<span>📎 原始文本</span><span class="ar">▼</span></div>'+
        '<div class="src-body"><div class="src-text">'+src.join('\n')+'</div></div></div>';
    }
  }
  return h;
}

function getMO(m,v) {
  if(v==='open_ended') {
    if('上下文' in m) return MODULE_ORDER['上下文_open'];
    if('题干定位' in m) return MODULE_ORDER['题干定位_open'];
  }
  if('上下文' in m) return MODULE_ORDER['上下文'];
  if('题干定位' in m) return MODULE_ORDER['题干定位'];
  if('原句/题干' in m) return MODULE_ORDER['原句/题干'];
  return Object.keys(m);
}

function md(t) {
  return t?t
    .replace(/<u>(.+?)<\/u>/g,'<u>$1</u>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>'):'';
}

function tm(el) { el.classList.toggle('open'); }

// ═══════════════════════════════════════════════
// Card Navigation
// ═══════════════════════════════════════════════
function go(i) {
  if(i<0||i>=exams.length) return;
  ci=i; visited.add(i);
  document.getElementById('ct').style.transform='translateX(-'+(i*100)+'%)';
  document.querySelectorAll('#dots .dot').forEach((d,j)=>{
    d.className='dot';
    if(j===i) d.classList.add('cur');
    else if(visited.has(j)) d.classList.add('done');
  });
  document.getElementById('btn-ov').innerHTML='第 <span class="qc">'+exams[i].number+'</span>/'+exams.length+' 题';
  document.getElementById('btn-prev').disabled=i===0;
  document.getElementById('btn-next').disabled=i>=exams.length-1;
}

function ts(e) { tsx=e.touches[0].clientX; tsy=e.touches[0].clientY; }
function te(e) {
  const dx=e.changedTouches[0].clientX-tsx, dy=e.changedTouches[0].clientY-tsy;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50) {
    if(dx<0&&ci<exams.length-1) go(ci+1);
    else if(dx>0&&ci>0) go(ci-1);
  }
}

function setExamType(t) { examType=t; }
function setVariant(v) { variant=v; }

// ═══════════════════════════════════════════════
// Question Overlay
// ═══════════════════════════════════════════════
function so() {
  document.getElementById('olist').innerHTML=exams.map((q,i)=>{
    const is=i===ci;
    return '<div class="oi'+(is?' cur':'')+'" onclick="go('+i+');ho()">'+
      '<span class="qn">'+q.number+'.</span>'+
      '<span class="qt">'+((q.modules['解析']||q.modules['上下文']||'').split('\n')[0].replace(/\*\*/g,'').substring(0,35))+'</span>'+
      '<span class="qs'+(visited.has(i)?' seen':'')+'">'+(visited.has(i)?'✓':'')+'</span>'+
      '</div>';
  }).join('');
  document.getElementById('overlay').classList.add('show');
}
function ho() { document.getElementById('overlay').classList.remove('show'); }

// ═══════════════════════════════════════════════
// History
// ═══════════════════════════════════════════════
function relDate(iso) {
  const d=new Date(iso+'Z'), now=new Date(), diff=now-d;
  const DAY=86400000;
  if(diff<DAY) return '今天';
  if(diff<DAY*2) return '昨天';
  if(diff<DAY*7) return Math.floor(diff/DAY)+'天前';
  return d.toLocaleDateString('zh-CN',{month:'short',day:'numeric'});
}

async function loadHist(reset) {
  if(reset) {
    histPage=1; histDone=false;
    document.getElementById('hist-list').innerHTML='';
    document.getElementById('hist-more').style.display='none';
    document.getElementById('empty-state').style.display='none';
  }
  try {
    const r=await fetch(apiBase+'/exams?page='+histPage);
    const {items, total}=await r.json();
    if(!items.length) {
      histDone=true;
      if(reset) {
        document.getElementById('hist-sec').style.display='none';
        document.getElementById('empty-state').style.display='block';
      }
      return;
    }
    document.getElementById('hist-sec').style.display='block';
    document.getElementById('empty-state').style.display='none';
    const el=document.getElementById('hist-list');
    items.forEach(i=>{
      const preview=(i.passage||'').replace(/\n/g,' ').substring(0,60);
      let tags='<span class="hi-tag type">'+(TYPE_LABEL[i.exam_type]||i.exam_type)+'</span>';
      if(i.variant&&i.variant!=='multiple_choice') tags+='<span class="hi-tag variant">'+(VARIANT_LABEL[i.variant]||i.variant)+'</span>';
      if(i.question_count) tags+='<span class="hi-tag count">'+i.question_count+'题</span>';
      el.insertAdjacentHTML('beforeend',
        '<div class="hist-item" onclick="lx(\''+i.id+'\')">'+
          '<div class="hi-row"><span class="hi-date">'+relDate(i.created_at)+'</span>'+tags+'</div>'+
          (preview?'<div class="hi-preview">'+preview+'</div>':'')+
        '</div>'
      );
    });
    const loaded=histPage*pageSize;
    histPage++;
    if(items.length>=pageSize&&(loaded+items.length)<total) {
      document.getElementById('hist-more').style.display='block';
      document.getElementById('hist-more-btn').disabled=false;
    } else { histDone=true; document.getElementById('hist-more').style.display='none'; }
  } catch(e) {
    if(reset) {
      document.getElementById('hist-sec').style.display='none';
      document.getElementById('empty-state').style.display='block';
    }
  }
}

function loadMore() {
  if(histDone) return;
  document.getElementById('hist-more-btn').disabled=true;
  loadHist(false);
}

async function lx(id) {
  _doneReceived=false; ttsStop(); ss('processing');
  document.getElementById('pst').textContent='正在加载…';
  document.getElementById('proc-hint').style.display='none';
  document.getElementById('proc-cancel').style.display='none';
  setStep(0);
  try {
    const r=await fetch(apiBase+'/exams/'+id);
    const e=await r.json();
    if(e.tutorial) { renderReviewData(reviewDataFromDB(e)); }
    else { se('该记录缺少精讲内容', false); }
  } catch(e) { se('加载失败', false); }
}

// ═══════════════════════════════════════════════
// TTS
// ═══════════════════════════════════════════════
let ttsQueue=[], ttsPlaying=false, ttsCardIdx=-1;
let _ttsVoices=[], _ttsVoicesReady=false, _ttsSupported=false;
try { _ttsSupported=typeof speechSynthesis!=='undefined'&&!!speechSynthesis; } catch(e) {}

if(_ttsSupported) {
  try {
    speechSynthesis.onvoiceschanged=()=>{ _ttsVoices=speechSynthesis.getVoices(); _ttsVoicesReady=true; };
    _ttsVoices=speechSynthesis.getVoices();
    if(_ttsVoices.length>0) _ttsVoicesReady=true;
  } catch(e) { _ttsSupported=false; }
}

function ttsVoicesOK() {
  if(!_ttsSupported) return 'unsupported';
  if(!_ttsVoicesReady) return 'loading';
  const en=_ttsVoices.some(v=>v.lang.startsWith('en'));
  const zh=_ttsVoices.some(v=>v.lang.startsWith('zh'));
  return en&&zh?'ok':en?'no-zh':'no-en';
}

function getTTSAutoSeq() {
  if(examType==='grammar_cloze'||examType==='cloze') return TTS_AUTO.cloze;
  if(examType==='reading_comp') return TTS_AUTO.reading;
  if(examType==='true_false') return TTS_AUTO.tf;
  return [];
}

function ttsSplit(text) {
  const segments=[];
  let i=0;
  while(i<text.length) {
    if(text[i]==='\uff0f') {
      let j=i+1;
      while(j<text.length&&text[j]!=='\uff0f') j++;
      if(j<text.length) { i=j+1; continue; }
      i++; continue;
    }
    if(/[a-zA-Z]/.test(text[i])) {
      let j=i;
      while(j<text.length&&/[a-zA-Z]/.test(text[j])) j++;
      segments.push({text:text.slice(i,j), lang:'en-US'});
      i=j; continue;
    }
    if(/[\u4e00-\u9fff]/.test(text[i])) {
      let j=i;
      while(j<text.length&&/[\u4e00-\u9fff]/.test(text[j])) j++;
      segments.push({text:text.slice(i,j), lang:'zh-CN'});
      i=j; continue;
    }
    let j=i;
    while(j<text.length&&!/[a-zA-Z\u4e00-\u9fff]/.test(text[j])) j++;
    const punct=text.slice(i,j).trim();
    if(punct) segments.push({text:punct, lang:'zh-CN'});
    i=j;
  }
  return segments;
}

function ttsBuildQueue(texts) {
  ttsQueue=[];
  for(const raw of texts) {
    const clean=raw.replace(/<[^>]+>/g,'').replace(/❌/g,'').replace(/\*\*/g,'').trim();
    if(!clean) continue;
    ttsQueue.push(...ttsSplit(clean));
  }
}

function ttsPlayQueue() {
  if(ttsQueue.length===0) { ttsOnEnd(); return; }
  ttsPlaying=true;
  const seg=ttsQueue.shift();
  const u=new SpeechSynthesisUtterance(seg.text);
  u.lang=seg.lang; u.rate=0.9;
  u.onend=()=>ttsPlayQueue();
  u.onerror=()=>ttsPlayQueue();
  speechSynthesis.speak(u);
}

function ttsStop() {
  speechSynthesis.cancel(); ttsQueue=[]; ttsPlaying=false; ttsCardIdx=-1;
  document.getElementById('btn-play').classList.remove('playing');
  document.querySelectorAll('.tts-active').forEach(el=>el.classList.remove('tts-active'));
}

function ttsOnEnd() {
  ttsPlaying=false; ttsCardIdx=-1;
  document.getElementById('btn-play').classList.remove('playing');
  document.querySelectorAll('.tts-active').forEach(el=>el.classList.remove('tts-active'));
}

function ttsSpeakCard(idx) {
  if(ttsPlaying) ttsStop();
  const q=exams[idx]; if(!q) return;
  const m=q.modules;
  const texts=[];
  for(const mod of getTTSAutoSeq()) { if(m[mod]) texts.push(m[mod]); }
  if(texts.length===0) return;
  ttsCardIdx=idx;
  ttsBuildQueue(texts);
  document.getElementById('btn-play').classList.add('playing');
  ttsPlayQueue();
}

function ttsPlayCard() {
  if(ttsPlaying) { ttsStop(); return; }
  ttsSpeakCard(ci);
}

function ttsSpeakModule(name, idx) {
  if(ttsPlaying) ttsStop();
  const q=exams[idx]; if(!q) return;
  const text=q.modules[name]; if(!text) return;
  ttsCardIdx=idx;
  ttsBuildQueue([text]);
  document.getElementById('btn-play').classList.add('playing');
  const el=document.getElementById('mod-'+idx+'-'+name);
  if(el) el.classList.add('tts-active');
  ttsPlayQueue();
}

function ttsSpeakText(text) {
  if(ttsPlaying) ttsStop();
  if(!text) return;
  ttsCardIdx=-1;
  ttsBuildQueue([text]);
  document.getElementById('btn-play').classList.add('playing');
  ttsPlayQueue();
}

// Drag & Drop
// ═══════════════════════════════════════════════
const uploadZone=document.getElementById('upload-zone');
uploadZone.addEventListener('dragover', e=>{ e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', ()=>{ uploadZone.classList.remove('dragover'); });
uploadZone.addEventListener('drop', e=>{
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
  if(files.length) { _doneReceived=false; up(files); }
});

// Event Bindings
// ═══════════════════════════════════════════════
document.getElementById('btn-back').onclick=()=>{ ttsStop(); ss('home'); };
document.getElementById('btn-prev').onclick=()=>go(ci-1);
document.getElementById('btn-next').onclick=()=>go(ci+1);
document.getElementById('btn-ov').onclick=()=>so();

document.addEventListener('keydown', e=>{
  if(document.getElementById('screen-review').classList.contains('active')) {
    if(e.key==='ArrowRight'&&ci<exams.length-1) go(ci+1);
    if(e.key==='ArrowLeft'&&ci>0) go(ci-1);
    if(e.key==='Escape') ho();
  }
});

document.addEventListener('paste', e=>{
  const it=e.clipboardData?.items; if(!it) return;
  const fs=[];
  for(const i of it) { if(i.type.startsWith('image/')) { const f=i.getAsFile(); if(f) fs.push(f); } }
  if(fs.length) { e.preventDefault(); _doneReceived=false; up(fs); }
});

if('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(()=>{}); }

async function initConfig() {
  try {
    const r=await fetch('/api/config');
    const cfg=await r.json();
    if(cfg.api_base!=null) apiBase=cfg.api_base;
    if(cfg.page_size) pageSize=cfg.page_size;
    if(cfg.allowed_types&&cfg.allowed_types.length) {
      allowedTypes=cfg.allowed_types;
      const accept=allowedTypes.join(',');
      document.getElementById('cam-in').accept=accept;
      document.getElementById('file-in').accept=accept;
    }
    _configOK=true;
  } catch(e) { console.warn('[exam-tutor] Config load failed, using defaults.', e); }
}
initConfig().then(()=>loadHist(true));

  }).catch(()=>{});
});

  fetch(apiBase+'/debug/client-error', {
    method:'POST', headers:{'Content-Type':'application/json'},

      userAgent:navigator.userAgent.substring(0,200), time:new Date().toISOString()})
  }).catch(()=>{});
});
